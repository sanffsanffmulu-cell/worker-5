name: Build Web to APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama Aplikasi'
        required: true
        default: 'MyWebApp'
      app_package:
        description: 'Package ID (contoh: com.example.app)'
        required: true
        default: 'com.example.mywebapp'
      website_url:
        description: 'URL Website (contoh: https://example.com)'
        required: true
        default: 'https://example.com'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install Cordova
        run: npm install -g cordova

      - name: 📁 Buat Project Cordova
        run: |
          cordova create webapp ${{ github.event.inputs.app_package }} "${{ github.event.inputs.app_name }}"
          cd webapp
          
          rm -rf www
          mkdir -p www
          cat > www/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>${{ github.event.inputs.app_name }}</title>
          </head>
          <body>
              <h3>Loading...</h3>
              <script>
                  window.location.href = "${{ github.event.inputs.website_url }}";
              </script>
          </body>
          </html>
          EOF

      - name: 🎨 Buat Icon Default
        run: |
          cd webapp
          sudo apt-get update && sudo apt-get install -y imagemagick
          convert -size 512x512 xc:blue -fill white -gravity center \
            -font Arial -pointsize 80 -annotate 0 "WEB" \
            www/icon.png

      - name: 📱 Add Android Platform
        run: |
          cd webapp
          cordova platform add android --save

      - name: 🔨 Build APK
        run: |
          cd webapp
          cordova build android --release

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: webapp/platforms/android/app/build/outputs/apk/release/app-release.apk