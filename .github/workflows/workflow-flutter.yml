name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Mode Build (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🦊 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: 🔧 Fix pubspec.yaml jika perlu
        run: |
          if [ -f "pubspec.yaml" ]; then
            # Tambahkan dependencies minimal jika tidak ada
            if ! grep -q "flutter:" pubspec.yaml; then
              echo "flutter:" >> pubspec.yaml
              echo "  sdk: flutter" >> pubspec.yaml
            fi
          fi

      - name: 📦 Get dependencies
        run: flutter pub get || flutter pub get --no-example

      - name: 🔨 Build APK
        run: |
          if [ "${{ github.event.inputs.build_mode }}" == "debug" ]; then
            flutter build apk --debug || flutter build apk --debug --no-tree-shake-icons
          else
            flutter build apk --release || flutter build apk --release --no-tree-shake-icons
          fi

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.build_mode == 'debug' && 'app-debug' || 'app-release' }}
          path: build/app/outputs/flutter-apk/app-${{ github.event.inputs.build_mode == 'debug' && 'debug' || 'release' }}.apk